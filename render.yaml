services:
  - type: web
    name: ai-resume-analyzer
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: MAX_FILE_SIZE_MB
        value: 5
      - key: PYTHON_VERSION
        value: 3.11.0
